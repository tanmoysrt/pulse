<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pulse">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c6cff"/>
      <stop offset="1" stop-color="#5a48d6"/>
    </linearGradient>
  </defs>

  <!-- antenna with a live pulse blip -->
  <line x1="128" y1="48" x2="128" y2="26" stroke="#5a48d6" stroke-width="7" stroke-linecap="round"/>
  <circle cx="128" cy="19" r="8" fill="#ff5d8f"/>

  <!-- body -->
  <rect x="40" y="46" width="176" height="176" rx="56" fill="url(#body)"/>

  <!-- eyes -->
  <circle cx="102" cy="116" r="15" fill="#fff"/>
  <circle cx="154" cy="116" r="15" fill="#fff"/>
  <circle cx="105" cy="119" r="6.5" fill="#241f45"/>
  <circle cx="157" cy="119" r="6.5" fill="#241f45"/>

  <!-- cheeks -->
  <ellipse cx="80" cy="152" rx="9" ry="5.5" fill="#ff5d8f" opacity="0.55"/>
  <ellipse cx="176" cy="152" rx="9" ry="5.5" fill="#ff5d8f" opacity="0.55"/>

  <!-- heartbeat smile -->
  <path d="M72 178 H104 L116 178 L124 150 L134 200 L144 178 H184"
        fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
