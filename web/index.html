<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />
  <link rel="icon" href="data:," />
  <title>Pulse</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f4f4f5;
      --surface-2: #fafafa;
      --hover: #e4e4e7;
      --border: #e4e4e7;
      --ink: #18181b;
      --text: #3f3f46;
      --muted: #71717a;
      --subtle: #a1a1aa;
      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 16px;
      --shadow: 0 10px 30px rgba(0,0,0,0.08);
      --shadow-lg: 0 20px 60px rgba(0,0,0,0.16);
      --overlay: rgba(0,0,0,0.28);
      --kb-offset: 0px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #09090b;
        --surface: #18181b;
        --surface-2: #27272a;
        --hover: #27272a;
        --border: #27272a;
        --ink: #fafafa;
        --text: #d4d4d8;
        --muted: #a1a1aa;
        --subtle: #71717a;
        --shadow: 0 10px 30px rgba(0,0,0,0.28);
        --shadow-lg: 0 20px 60px rgba(0,0,0,0.48);
        --overlay: rgba(0,0,0,0.62);
      }
    }

    * { box-sizing: border-box; margin: 0; }
    *:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
    * { scrollbar-width: thin; scrollbar-color: var(--subtle) transparent; }
    *::-webkit-scrollbar { width: 6px; height: 6px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: var(--subtle); border-radius: 999px; }

    html, body { height: 100%; height: 100dvh; }
    body {
      font: 15px/1.6 "Geist", "SF Pro Text", "Helvetica Neue", ui-sans-serif, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      letter-spacing: -0.006em;
      -webkit-font-smoothing: antialiased;
    }

    .app { height: 100%; display: flex; flex-direction: column; max-width: 820px; margin: 0 auto; position: relative; }

    /* Boot */
    .boot-loader { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; background: var(--bg); }
    @keyframes msgIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .row, .thinking, .act, .cmd-row, .working { animation: msgIn 0.2s ease-out; }
    .chev { color: currentColor; opacity: 0.5; transition: transform 0.15s ease; flex-shrink: 0; }
    .chev.up { transform: rotate(180deg); }
    .mono { font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; }

    /* Collapsibles */
    .thinking .think-body, .act .act-body { display: none; }
    .thinking.open .think-body, .act.open .act-body { display: block; }
    .thinking.open .think-bar .chev, .act.open .act-head .chev { transform: rotate(180deg); }

    /* Header */
    header {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      padding: 16px 22px 12px;
      padding-top: calc(16px + env(safe-area-inset-top));
      position: sticky; top: 0;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid transparent;
      z-index: 20;
    }
    header.shadow { border-color: var(--border); }
    .brand { display: flex; align-items: center; gap: 8px; min-width: 0; font-weight: 560; font-size: 15px; color: var(--ink); letter-spacing: -0.02em; }
    .title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status-badge {
      flex: none; font-size: 11px; font-weight: 600; letter-spacing: 0.03em; color: var(--muted);
      border: 1px solid var(--border); padding: 2px 7px; border-radius: 999px;
    }

    .header-right { display: flex; align-items: center; gap: 6px; flex: none; }

    .tasks-chip {
      display: flex; align-items: center; gap: 6px; max-width: 40vw;
      background: transparent; color: var(--text); padding: 4px 9px; border-radius: 999px;
      font-size: 13px; cursor: pointer; user-select: none; white-space: nowrap;
      transition: background 0.15s;
    }
    .tasks-chip:hover { background: var(--hover); }
    .tasks-progress { font-weight: 600; color: var(--ink); font-variant-numeric: tabular-nums; }
    .tasks-now { overflow: hidden; text-overflow: ellipsis; color: var(--muted); }

    .kebab-wrap { position: relative; flex: none; }
    .kebab {
      width: 30px; height: 30px; border: 0; border-radius: 999px; background: none; color: var(--muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .kebab:hover, .kebab.active { background: var(--hover); color: var(--ink); }
    .kebab-menu {
      position: absolute; top: calc(100% + 8px); right: 0; z-index: 50;
      width: 224px; max-width: calc(100vw - 28px);
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 6px; box-shadow: var(--shadow-lg);
      animation: menuIn 0.15s ease-out;
    }
    @keyframes menuIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .menurow, .menuitem {
      position: relative; display: flex; align-items: center; gap: 8px; width: 100%;
      padding: 8px 10px; border-radius: var(--radius-sm); background: none; border: 0; cursor: pointer;
      font: inherit; font-size: 13px; color: var(--text); text-align: left;
      transition: background 0.15s;
    }
    .menurow:hover, .menurow.active, .menuitem:hover { background: var(--surface); }
    .menurow-label { flex: 1; }
    .menurow-val { color: var(--muted); font-size: 13px; overflow: hidden; text-overflow: ellipsis; max-width: 84px; white-space: nowrap; }
    .menurow.cap .menurow-val { text-transform: capitalize; }
    .menu-divider { height: 1px; background: var(--border); margin: 6px 4px; }
    .menuitem.danger { color: var(--ink); }
    .menuitem.danger:hover { background: var(--surface); }
    .kebab-wrap .kebab-menu .menu { bottom: auto; left: auto; top: calc(100% + 6px); right: 0; }

    .tasks-sheet {
      margin: 0 18px 10px; padding: 10px 12px;
      background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-lg);
      animation: slideDown 0.2s ease-out;
    }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .tasks-list { list-style: none; padding: 0; }
    .tasks-list li { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; color: var(--text); }
    .task-content { line-height: 1.45; font-size: 14px; }
    .tick { width: 14px; height: 14px; border-radius: 50%; border: 1px solid var(--subtle); flex: none; margin-top: 3px; }
    .tasks-list .completed { color: var(--muted); }
    .tasks-list .completed .tick { background: var(--muted); border-color: var(--muted); }
    .tasks-list .completed .task-content { text-decoration: line-through; opacity: 0.7; }
    .tasks-list .in_progress .tick { border-color: var(--ink); box-shadow: inset 0 0 0 3px var(--surface-2), inset 0 0 0 5px var(--ink); }

    /* Transcript */
    main { flex: 1; overflow-y: auto; padding: 18px 22px calc(var(--footer-h, 110px) + 24px); -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
    .empty { color: var(--muted); text-align: center; margin-top: 42vh; transform: translateY(-50%); padding: 0 24px; }
    .pulse-rings { position: relative; width: 48px; height: 48px; margin: 0 auto 20px; }
    .pulse-rings::after { content: ''; position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; margin: -3px 0 0 -3px; border-radius: 50%; background: var(--ink); }
    .pulse-rings span { position: absolute; inset: 0; border: 1.5px solid var(--ink); border-radius: 50%; opacity: 0; animation: ping 2.4s cubic-bezier(0,0,0.2,1) infinite; }
    .pulse-rings span:nth-child(2) { animation-delay: 0.8s; }
    .pulse-rings span:nth-child(3) { animation-delay: 1.6s; }
    @keyframes ping { 0% { transform: scale(0.25); opacity: 0.5; } 80%,100% { transform: scale(1); opacity: 0; } }
    .empty h2 { font-size: 18px; font-weight: 600; color: var(--ink); letter-spacing: -0.02em; margin-bottom: 6px; }
    .empty p { font-size: 14px; color: var(--muted); }

    .cmd-row { display: flex; justify-content: center; margin: 10px 0 18px; }
    .cmd {
      font: 12px ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--muted);
      background: transparent; padding: 3px 10px; border: 1px solid var(--border); border-radius: 999px;
      max-width: 90%; white-space: pre-wrap; word-break: break-word; text-align: center;
    }

    .row { display: flex; margin-bottom: 20px; }
    .row.user { justify-content: flex-end; }
    .bubble { max-width: 88%; white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere; line-height: 1.6; }
    .bubble.assistant { color: var(--text); }
    .bubble.user { background: var(--ink); color: var(--bg); padding: 11px 15px; border-radius: var(--radius-lg); border-bottom-right-radius: 6px; }
    .bubble.user.pending { opacity: 0.5; }
    .bubble-attachments { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
    .bubble-attachments .thumb { width: 56px; height: 56px; border-radius: var(--radius-sm); object-fit: cover; display: block; }
    .bubble-attachments .filesvg {
      width: 56px; height: 56px; border-radius: var(--radius-sm); background: rgba(255,255,255,0.14);
      display: flex; align-items: center; justify-content: center; color: inherit; font-size: 11px; text-align: center; padding: 4px; overflow: hidden;
    }
    .bubble code { font: 13px ui-monospace, SFMono-Regular, Menlo, monospace; background: var(--surface); border: 1px solid var(--border); padding: 2px 5px; border-radius: 5px; color: var(--ink); }
    .bubble.user code { background: rgba(255,255,255,0.14); border-color: transparent; color: inherit; }
    .bubble .code { white-space: pre; overflow-x: auto; margin: 8px 0; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
    .bubble.user .code { background: rgba(255,255,255,0.08); border-color: transparent; }
    .bubble .code code { background: none; border: 0; padding: 0; font-size: 13px; color: inherit; }

    /* Thinking */
    .thinking { margin: 0 0 14px; }
    .think-bar { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left; background: none; border: 0; cursor: pointer; padding: 4px 0; font: inherit; color: var(--subtle); transition: color 0.2s; }
    .think-bar:hover { color: var(--muted); }
    .think-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--subtle); animation: pulse 1.4s infinite; flex: none; }
    @keyframes pulse { 0%,100% { opacity: 0.35; } 50% { opacity: 1; } }
    .tag { font-size: 12px; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; color: inherit; flex: none; }
    .think-sum { flex: 1; color: inherit; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .think-body { color: var(--muted); font-style: italic; font-size: 14px; white-space: pre-wrap; word-break: break-word; padding: 6px 0 0 14px; }

    /* Tool activity */
    .act { margin: 0 0 8px; }
    .act-head { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left; background: none; border: 0; cursor: pointer; padding: 4px 0; font: inherit; color: var(--subtle); transition: color 0.2s; }
    .act-head:hover { color: var(--muted); }
    .act-icon { width: 6px; height: 6px; border-radius: 50%; background: var(--subtle); flex: none; }
    .act-icon.tool_use, .act-icon.tool_result { background: var(--subtle); }
    .act-name { font: 13px ui-monospace, SFMono-Regular, Menlo, monospace; font-weight: 600; color: inherit; flex: none; }
    .act-sum { flex: 1; color: inherit; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .act-body { white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere; padding: 6px 0 0 14px; color: var(--muted); font-size: 14px; }

    .working { display: flex; align-items: center; gap: 10px; margin: 6px 0 20px; color: var(--muted); font-size: 14px; }
    .pulse-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ink); animation: pulse 1.4s infinite; }
    .working-verb { color: var(--text); font-weight: 500; }
    .working-time { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 13px; }

    .scroll-fab {
      position: fixed; left: 50%; transform: translateX(-50%);
      bottom: calc(var(--footer-h, 96px) + 16px + var(--kb-offset)); z-index: 15;
      width: 32px; height: 32px; border-radius: 999px; border: 1px solid var(--border); background: var(--bg); color: var(--text);
      cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow);
    }

    /* Permission sheet */
    .perm-sheet {
      position: fixed; left: 50%; bottom: var(--kb-offset); transform: translateX(-50%);
      width: 100%; max-width: 820px; z-index: 40;
      background: var(--surface-2); border: 1px solid var(--border); border-bottom: 0;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      box-shadow: var(--shadow-lg);
    }
    .perm-handle { width: 36px; height: 4px; border-radius: 999px; background: var(--border); margin: 0 auto 10px; }
    .perm-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .perm-title-row { display: flex; align-items: center; gap: 8px; min-width: 0; flex: 1; }
    .perm-action { display: block; font-weight: 600; font-size: 15px; color: var(--ink); letter-spacing: -0.01em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .perm-sum {
      display: block; font: 12px ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--muted);
      margin-top: 8px; padding: 8px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
      word-break: break-word;
    }
    .perm-more { background: none; border: 0; color: var(--subtle); font: inherit; font-size: 12px; cursor: pointer; flex: none; padding: 3px 7px; margin: -3px -7px; border-radius: 6px; font-weight: 500; transition: background 0.15s, color 0.15s; }
    .perm-more:hover { color: var(--ink); background: var(--hover); }
    .perm-details { white-space: pre-wrap; word-break: break-word; max-height: 24vh; overflow-y: auto; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; margin: 8px 0 0; color: var(--text); font-size: 13px; }
    .perm-actions { display: flex; flex-direction: row-reverse; justify-content: flex-start; gap: 6px; margin-top: 12px; }
    .perm-actions button {
      min-height: 28px; padding: 4px 10px; border: 1px solid transparent; border-radius: var(--radius-sm); font: inherit; font-size: 13px;
      font-weight: 500; cursor: pointer; transition: opacity 0.15s, background 0.15s;
    }
    .perm-actions .allow { background: var(--ink); color: var(--bg); }
    .perm-actions .allow:hover { opacity: 0.9; }
    .perm-actions .deny {
      background: none; color: var(--text);
      border-color: var(--border);
    }
    .perm-actions .deny:hover { background: var(--hover); }
    .perm-backdrop { display: none; }
    @media (min-width: 640px) {
      .perm-backdrop {
        display: block; position: fixed; inset: 0; z-index: 39;
        background: var(--overlay);
      }
      .perm-sheet {
        left: 50%; top: 50%; bottom: auto; transform: translate(-50%, -50%);
        width: calc(100% - 48px); max-width: 360px;
        border-radius: var(--radius); padding: 16px 20px;
        border: 1px solid var(--border);
      }
      .perm-handle { display: none; }
      .perm-action { font-size: 16px; }
      .perm-actions { justify-content: flex-start; }
    }

    /* Composer */
    footer {
      position: fixed; left: 50%; bottom: var(--kb-offset); transform: translateX(-50%);
      width: 100%; max-width: 820px; z-index: 30;
      padding: 10px 16px calc(14px + env(safe-area-inset-bottom)); pointer-events: none;
      transition: bottom 0.15s;
    }
    .composer {
      pointer-events: auto;
      background: color-mix(in srgb, var(--bg) 94%, transparent);
      border: 1px solid var(--border); border-radius: 22px;
      padding: 12px 14px; box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .composer:focus-within { border-color: var(--subtle); box-shadow: var(--shadow-lg); }

    .composer textarea {
      display: block; width: 100%; resize: none; border: 0; background: transparent; color: var(--text);
      font: inherit; font-size: 14px; line-height: 20px; font-weight: 400; letter-spacing: 0;
      padding: 2px 0 3px; outline: none; max-height: 35vh;
    }
    .composer textarea::placeholder { color: var(--subtle); font-size: inherit; font-weight: 400; }

    .composer-bottom { display: flex; align-items: center; gap: 8px; padding-top: 8px; }
    .toolbar { flex: 1; min-width: 0; display: flex; flex-wrap: wrap; gap: 6px; }

    .attachbtn {
      flex: none; width: 30px; height: 30px; border: 0; border-radius: 999px; background: none; color: var(--muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .attachbtn:hover { background: var(--hover); color: var(--ink); }

    .attach-strip { display: flex; flex-wrap: wrap; gap: 5px; padding: 0 0 5px; }
    .attach-chip {
      position: relative; display: flex; align-items: center; gap: 5px; max-width: 138px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 7px;
      padding: 2px 6px 2px 3px; font-size: 12px; line-height: 1.35; color: var(--text);
    }
    .attach-chip.error { border-color: var(--ink); }
    .attach-chip .thumb { width: 20px; height: 20px; border-radius: 4px; object-fit: cover; flex: none; background: var(--hover); }
    .attach-chip .filesvg { width: 20px; height: 20px; border-radius: 4px; flex: none; display: flex; align-items: center; justify-content: center; background: var(--hover); color: var(--muted); font-size: 9px; }
    .attach-chip .attach-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .attach-chip .attach-remove {
      flex: none; width: 14px; height: 14px; border-radius: 50%; border: 0; background: var(--hover); color: var(--muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; line-height: 1; padding: 0;
    }
    .attach-chip .attach-remove:hover { background: var(--border); color: var(--ink); }
    .attach-chip .attach-spin {
      position: absolute; inset: 0; border-radius: var(--radius-sm); background: rgba(0,0,0,0.35);
      display: flex; align-items: center; justify-content: center;
    }
    .attach-chip .attach-spin::after {
      content: ''; width: 10px; height: 10px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sel {
      position: relative; display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 500;
      color: var(--text); padding: 5px 10px; border-radius: 999px; cursor: pointer; user-select: none;
      background: transparent; border: 1px solid var(--border); transition: background 0.15s; white-space: nowrap;
    }
    .sel:hover { background: var(--hover); }
    .sel.active { color: var(--ink); background: var(--hover); }
    .sel.cap { text-transform: capitalize; }
    .sel .chev { opacity: 0.5; flex: none; }
    .sel-label { overflow: hidden; text-overflow: ellipsis; max-width: 40vw; }
    .menu {
      position: absolute; bottom: calc(100% + 8px); left: 0; z-index: 50; background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 4px; min-width: 140px;
      box-shadow: var(--shadow-lg); animation: menuIn 0.15s ease-out;
    }
    .menu button { display: block; width: 100%; text-align: left; background: none; border: 0; color: var(--text); font: inherit; padding: 8px 12px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; }
    .menu button:hover { background: var(--surface); }
    .menu button.current { color: var(--ink); font-weight: 600; }

    .menu.combo { width: 220px; max-width: 72vw; }
    .combo-input {
      width: 100%; box-sizing: border-box; margin-bottom: 4px; padding: 8px 10px;
      border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface);
      color: var(--ink); font: inherit; font-size: 15px; outline: none;
    }
    .combo-input:focus { border-color: var(--subtle); }
    .combo-list { max-height: 240px; overflow-y: auto; }
    .combo-empty { padding: 10px 12px; color: var(--muted); font-size: 13px; }

    .iconbtn {
      flex: none; width: 30px; height: 30px; border: 0; border-radius: 999px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s;
    }
    .send { background: var(--ink); color: var(--bg); }
    .send:disabled { opacity: 0.3; cursor: default; }
    .stopbtn { background: var(--surface); color: var(--ink); border: 1px solid var(--border); }
    .stopbtn:hover { background: var(--hover); }

    @media (min-width: 860px) {
      header { padding-left: 28px; padding-right: 28px; }
      main { padding-left: 28px; padding-right: 28px; }
      footer { padding-left: 22px; padding-right: 22px; }
      .bubble { max-width: 76%; }
      .bubble.assistant { max-width: 82%; }
    }

    @media (max-width: 520px) {
      header { padding-left: 16px; padding-right: 12px; gap: 10px; }
      main { padding: 12px 16px calc(var(--footer-h, 110px) + 18px); }
      footer { padding: 8px 10px calc(10px + env(safe-area-inset-bottom)); }
      .tasks-chip { max-width: 46vw; }
      .tasks-now { display: none; }
      .bubble { max-width: 94%; }
      .perm-sheet, footer { border-radius: var(--radius) var(--radius) 0 0; }
      .composer { border-radius: 20px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="boot" class="boot-loader"><div class="pulse-rings"><span></span><span></span><span></span></div></div>
    <header id="header"></header>
    <div id="tasksSheet"></div>
    <main id="scroller">
      <div id="empty"></div>
      <div id="messages"></div>
      <div id="queued"></div>
      <div id="working"></div>
    </main>
    <div id="fabSlot"></div>
    <div id="permSlot"></div>
    <footer>
      <div class="composer" id="composer">
        <div class="attach-strip" id="attachStrip"></div>
        <textarea id="composerInput" rows="1"></textarea>
        <div class="composer-bottom">
          <div class="toolbar" id="toolbar"></div>
          <span id="attachSlot"></span>
          <span id="sendSlot"></span>
        </div>
      </div>
    </footer>
    <input type="file" id="fileInput" multiple hidden>
  </div>

  <script>
  (function () {
    'use strict'

    var status = 'connecting'
    var agent = ''
    var title = ''
    var modelLabel = ''
    var effortLabel = ''
    var mode = ''
    var todos = []
    var pending = null
    var queued = []
    var attachments = []
    var attachSeq = 0
    var messages = []
    var seen = new Set()
    var menuOpen = null
    var comboQuery = ''
    var tasksOpen = false
    var kebabOpen = false
    var permOpen = false
    var lastPendingId = null
    var sending = false
    var atBottom = true
    var headerShadow = false
    var modelsLoaded = false
    var started = false
    var sessionClosed = false
    var opencodeModels = []
    var prevStatus = 'connecting'

    var MODES_BY_AGENT = {
      claude: [
        { id: 'manual', label: 'Manual' },
        { id: 'acceptEdits', label: 'Edit' },
        { id: 'plan', label: 'Plan' },
        { id: 'auto', label: 'Auto' },
      ],
      codex: [
        { id: 'default', label: 'Default' },
        { id: 'plan', label: 'Plan' },
      ],
      opencode: [
        { id: 'build', label: 'Build' },
        { id: 'plan', label: 'Plan' },
      ],
    }
    var STATIC_MODELS_BY_AGENT = {
      claude: [
        { id: 'default', label: 'Default' },
        { id: 'opus', label: 'Opus' },
        { id: 'sonnet', label: 'Sonnet' },
        { id: 'haiku', label: 'Haiku' },
      ],
      codex: [
        { id: 'gpt-5.5', label: 'GPT-5.5' },
        { id: 'gpt-5.4', label: 'GPT-5.4' },
        { id: 'gpt-5.4-mini', label: 'GPT-5.4 Mini' },
      ],
    }
    var EFFORTS_BY_AGENT = {
      claude: [
        { id: 'low', label: 'Low' },
        { id: 'medium', label: 'Medium' },
        { id: 'high', label: 'High' },
        { id: 'xhigh', label: 'XHigh' },
        { id: 'max', label: 'Max' },
      ],
      codex: [
        { id: 'low', label: 'Low' },
        { id: 'medium', label: 'Medium' },
        { id: 'high', label: 'High' },
        { id: 'xhigh', label: 'XHigh' },
      ],
    }
    var AGENT_LABELS = { claude: 'Claude', codex: 'Codex', opencode: 'OpenCode' }
    var WORKING_VERBS = ['Working', 'Thinking', 'Crunching', 'Cooking', 'Percolating', 'Simmering', 'Churning', 'Pondering', 'Brewing', 'Conjuring']

    function MODES() { return MODES_BY_AGENT[agent] || [] }
    function MODELS() { return agent === 'opencode' ? opencodeModels : (STATIC_MODELS_BY_AGENT[agent] || []) }
    function EFFORTS() { return EFFORTS_BY_AGENT[agent] || [] }
    function agentLabel() { return AGENT_LABELS[agent] || 'your session' }
    function isBusy() { return status === 'running' || status === 'needs_approval' }
    function modeLabel() { var m = MODES().find(function (x) { return x.id === mode }); return m ? m.label : '' }
    function doneCount() { return todos.filter(function (t) { return t.status === 'completed' }).length }
    function currentTask() {
      var t = todos.find(function (t) { return t.status === 'in_progress' }) ||
              todos.find(function (t) { return t.status !== 'completed' })
      return t ? t.content : 'All tasks done'
    }
    function appReady() {
      if (sessionClosed) return true
      if (!started) return false
      if (status === 'connecting' || !modelsLoaded) return false
      if (agent === 'opencode' && !modelLabel) return false
      return true
    }

    function modelFamily(m) {
      var first = m.replace(/^claude-/, '').split(/[-\s]/)[0] || ''
      return first.charAt(0).toUpperCase() + first.slice(1).toLowerCase()
    }
    function displayModel(m) { return agent === 'claude' ? modelFamily(m) : m }

    function applyCommandState(text) {
      var mm = text.match(/^Set model to (.+?)(?: and saved.*)?$/)
      if (mm) { modelLabel = modelFamily(mm[1].trim()); return true }
      var em = text.match(/^(?:Set|Kept) effort level to (\w+)/)
      if (em) { effortLabel = em[1]; return true }
      return /^\/(model|effort)\b/.test(text)
    }

    var isTouch = !!(window.matchMedia && window.matchMedia('(pointer: coarse)').matches)

    var scroller = document.getElementById('scroller')
    var CHEV = '<svg class="chev" width="10" height="10" viewBox="0 0 10 10"><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>'

    function escapeHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') }
    function firstLine(text) { return text.split('\n')[0] }
    function parseJSON(text) { try { return JSON.parse(text) } catch (e) { return null } }
    function pick(o, keys) { for (var i = 0; i < keys.length; i++) { var k = keys[i]; if (o && o[k] != null) return String(o[k]) } return '' }
    var SUMMARY_KEYS = ['command', 'file_path', 'path', 'pattern', 'url', 'query', 'description']
    function toolSummary(m) { return pick(parseJSON(m.text) || {}, SUMMARY_KEYS).split('\n')[0] }

    function renderText(text) {
      var parts = text.split('```')
      var html = ''
      parts.forEach(function (part, i) {
        if (i % 2 === 1) {
          var body = part.replace(/^[^\n]*\n/, function (m) { return m.trim() ? '' : m })
          html += '<pre class="code mono"><code>' + escapeHtml(body.replace(/\n$/, '')) + '</code></pre>'
        } else {
          var seg = escapeHtml(part)
          seg = seg.replace(/`([^`]+)`/g, '<code>$1</code>')
          seg = seg.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          html += seg
        }
      })
      return html
    }

    var PERM_ACTIONS = {
      Bash: 'Run command', Read: 'Read file', Edit: 'Edit file', Write: 'Write file',
      MultiEdit: 'Edit file', NotebookEdit: 'Edit notebook', Glob: 'Find files',
      Grep: 'Search', WebFetch: 'Fetch page', WebSearch: 'Web search',
    }
    function permAction(p) { return PERM_ACTIONS[p.toolName] || p.toolName }
    function permSummary(p) { return pick(p.toolInput || {}, SUMMARY_KEYS).split('\n')[0] }
    function permDetails(p) { try { return JSON.stringify(p.toolInput, null, 2) } catch (e) { return '' } }

    function div(cls) { var d = document.createElement('div'); if (cls) d.className = cls; return d }

    function nearBottom() { var el = scroller; return !el || el.scrollHeight - el.scrollTop - el.clientHeight < 120 }
    function scrollDown(force) {
      if (!force && !nearBottom()) return
      requestAnimationFrame(function () { scroller.scrollTop = scroller.scrollHeight })
    }
    scroller.addEventListener('scroll', function () {
      atBottom = nearBottom()
      headerShadow = (scroller.scrollTop || 0) > 4
      document.getElementById('header').classList.toggle('shadow', headerShadow)
      renderFab()
    })

    var vv = window.visualViewport
    function reclampOpenMenu() {
      if (!menuOpen) return
      var openMenu = document.querySelector('.menu')
      if (openMenu) clampMenu(openMenu)
    }
    function updateKeyboardOffset() {
      if (!vv) return
      var offset = Math.max(0, Math.round(window.innerHeight - vv.height - vv.offsetTop))
      document.documentElement.style.setProperty('--kb-offset', offset + 'px')
      if (atBottom) scrollDown(true)
      reclampOpenMenu()
    }
    if (vv) {
      vv.addEventListener('resize', updateKeyboardOffset)
      vv.addEventListener('scroll', updateKeyboardOffset)
    }
    window.addEventListener('orientationchange', reclampOpenMenu)

    var footerEl = document.querySelector('footer')
    if (window.ResizeObserver) {
      new ResizeObserver(function (entries) {
        document.documentElement.style.setProperty('--footer-h', entries[0].contentRect.height + 'px')
      }).observe(footerEl)
    }

    var messagesEl = document.getElementById('messages')
    function buildMessage(m) {
      if (m.kind === 'text') {
        var row = div('row ' + m.role)
        var b = div('bubble ' + m.role)
        b.innerHTML = renderText(m.text)
        row.appendChild(b)
        return row
      }
      if (m.kind === 'command') {
        var cr = div('cmd-row')
        var s = document.createElement('span')
        s.className = 'cmd'; s.textContent = m.text
        cr.appendChild(s)
        return cr
      }
      if (m.kind === 'thinking') {
        var t = div('thinking')
        t.innerHTML = '<button class="think-bar" data-toggle="1"><span class="think-dot"></span><span class="tag">Thinking</span><span class="think-sum"></span>' + CHEV + '</button><div class="think-body"></div>'
        t.querySelector('.think-sum').textContent = firstLine(m.text)
        t.querySelector('.think-body').textContent = m.text
        return t
      }
      var a = div('act')
      var name = m.kind === 'tool_use' ? (m.name || '') : 'Output'
      var sum = m.kind === 'tool_use' ? toolSummary(m) : firstLine(m.text)
      a.innerHTML = '<button class="act-head" data-toggle="1"><span class="act-icon ' + m.kind + '"></span><span class="act-name"></span><span class="act-sum"></span>' + CHEV + '</button><pre class="act-body mono"></pre>'
      a.querySelector('.act-name').textContent = name
      a.querySelector('.act-sum').textContent = sum
      a.querySelector('.act-body').textContent = m.text
      return a
    }

    function onMessage(m) {
      if (seen.has(m.line)) return
      seen.add(m.line)
      if (m.kind === 'command' && applyCommandState(m.text)) return
      if (m.role === 'user' && m.kind === 'text' && queued.length) {
        (queued[0].attachments || []).forEach(function (a) { if (a.previewUrl) URL.revokeObjectURL(a.previewUrl) })
        queued.shift(); renderQueued()
      }
      var stick = nearBottom()
      messages.push(m)
      messagesEl.appendChild(buildMessage(m))
      renderEmpty()
      scrollDown(stick)
    }

    function renderEmpty() {
      var el = document.getElementById('empty')
      if (sessionClosed) {
        el.style.display = ''
        el.className = 'empty'
        el.innerHTML = '<h2></h2><p></p>'
        el.querySelector('h2').textContent = 'Session closed'
        el.querySelector('p').textContent = 'This ' + agentLabel() + ' session has ended.'
        return
      }
      if (messages.length || isBusy()) { el.style.display = 'none'; el.innerHTML = ''; return }
      el.style.display = ''
      var connecting = status === 'connecting'
      el.className = 'empty'
      el.innerHTML =
        '<div class="pulse-rings"><span></span><span></span><span></span></div>' +
        '<h2></h2><p></p>'
      el.querySelector('h2').textContent = connecting ? 'Connecting…' : 'Ready when you are'
      el.querySelector('p').textContent = connecting ? ('Linking up with ' + agentLabel() + '.') : 'Send a message below to get started.'
    }

    function isImageType(type) { return /^image\//.test(type || '') }
    function fileExtLabel(name) {
      var m = /\.([A-Za-z0-9]{1,6})$/.exec(name || '')
      return m ? m[1].toUpperCase() : 'FILE'
    }
    function attachThumbHTML(a) {
      if (isImageType(a.type) && a.previewUrl) return '<img class="thumb" src="' + a.previewUrl + '" alt="">'
      return '<div class="filesvg"></div>'
    }

    function renderQueued() {
      var el = document.getElementById('queued')
      el.innerHTML = ''
      queued.forEach(function (q) {
        var row = div('row user')
        var b = div('bubble user pending')
        b.title = 'Queued'
        if (q.attachments && q.attachments.length) {
          var strip = div('bubble-attachments')
          strip.innerHTML = q.attachments.map(attachThumbHTML).join('')
          var fileDivs = strip.querySelectorAll('.filesvg')
          var fileAtts = q.attachments.filter(function (a) { return !isImageType(a.type) || !a.previewUrl })
          fileDivs.forEach(function (d, i) { d.textContent = fileExtLabel(fileAtts[i] && fileAtts[i].name) })
          b.appendChild(strip)
        }
        if (q.caption) {
          var cap = document.createElement('div')
          cap.textContent = q.caption
          b.appendChild(cap)
        }
        row.appendChild(b)
        el.appendChild(row)
      })
    }

    var elapsed = 0, turnStart = 0, timer = null
    function workingVerb() { return WORKING_VERBS[Math.floor(elapsed / 4) % WORKING_VERBS.length] }
    function updateWorking() {
      var el = document.getElementById('working')
      if (status !== 'running') { el.innerHTML = ''; return }
      if (!el.firstChild) {
        el.innerHTML = '<div class="working"><span class="pulse-dot"></span><span class="working-verb"></span><span class="working-time"></span></div>'
      }
      el.querySelector('.working-verb').textContent = workingVerb() + '…'
      el.querySelector('.working-time').textContent = elapsed + 's'
    }
    function onStatusChange(s, prev) {
      if (s === 'running' && prev !== 'running') {
        turnStart = Date.now(); elapsed = 0
        clearInterval(timer)
        timer = setInterval(function () { elapsed = Math.floor((Date.now() - turnStart) / 1000); updateWorking() }, 1000)
      } else if (s !== 'running') {
        clearInterval(timer); timer = null
      }
      updateWorking()
    }

    function renderFab() {
      var el = document.getElementById('fabSlot')
      var show = !atBottom && !pending
      if (!show) { el.innerHTML = ''; return }
      if (!el.firstChild) {
        el.innerHTML = '<button class="scroll-fab" data-fab="1"><svg width="14" height="14" viewBox="0 0 18 18"><path d="M4 7L9 12L14 7" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></button>'
      }
    }

    function renderHeader() {
      var el = document.getElementById('header')
      el.classList.toggle('shadow', headerShadow)
      var html = '<div class="brand">'
      html += '<span class="title"></span>'
      if (status === 'connecting' && !sessionClosed) html += '<span class="status-badge">Connecting</span>'
      else if (status === 'disconnected') html += '<span class="status-badge">Offline</span>'
      html += '</div><div class="header-right">'
      if (todos.length) {
        html += '<div class="tasks-chip" data-tasks="1">' +
          '<span class="tasks-progress">' + doneCount() + '/' + todos.length + '</span>' +
          '<span class="tasks-now"></span>' +
          '<svg class="chev' + (tasksOpen ? ' up' : '') + '" width="10" height="10" viewBox="0 0 10 10"><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
          '</div>'
      }
      html += '<div class="kebab-wrap"><button class="kebab' + (kebabOpen ? ' active' : '') + '" data-kebab="1" title="Session menu" aria-label="Session menu">' +
        '<svg width="12" height="12" viewBox="0 0 16 16"><circle cx="8" cy="3" r="1.4" fill="currentColor"/><circle cx="8" cy="8" r="1.4" fill="currentColor"/><circle cx="8" cy="13" r="1.4" fill="currentColor"/></svg></button>'
      if (kebabOpen) html += buildKebabMenuHTML()
      html += '</div></div>'
      el.innerHTML = html
      el.querySelector('.title').textContent = title || 'Pulse'
      if (todos.length) el.querySelector('.tasks-now').textContent = currentTask()
      if (kebabOpen) wireKebabMenu(el.querySelector('.kebab-menu'))
    }

    function buildKebabMenuHTML() {
      var html = '<div class="kebab-menu">'
      menuSelectors().forEach(function (s) {
        html += '<button class="menurow' + (s.key === 'effort' ? ' cap' : '') + (menuOpen === s.key ? ' active' : '') + '" data-sel-key="' + s.key + '">' +
          '<span class="menurow-label"></span><span class="menurow-val"></span>' + CHEV + '</button>'
      })
      if (menuSelectors().length) html += '<div class="menu-divider"></div>'
      html += '<button class="menuitem" data-clear="1">Clear chat</button>' +
        '<button class="menuitem danger" data-close="1">Close session</button>'
      html += '</div>'
      return html
    }

    function wireKebabMenu(panel) {
      var rows = panel.querySelectorAll('.menurow')
      var sels = menuSelectors()
      rows.forEach(function (row, i) {
        var s = sels[i]
        row.querySelectorAll('.menu').forEach(function (menu) { menu.remove() })
        row.classList.toggle('active', menuOpen === s.key)
        row.querySelector('.menurow-label').textContent = s.key === 'effort' ? 'Effort' : 'Model'
        row.querySelector('.menurow-val').textContent = s.label
        if (menuOpen === s.key) row.appendChild(menuFor(s))
      })
      afterMenuRender(panel)
    }

    function refreshKebabMenu() {
      var panel = document.querySelector('.kebab-menu')
      if (!panel) return false
      wireKebabMenu(panel)
      return true
    }

    function renderTasks() {
      var el = document.getElementById('tasksSheet')
      if (!todos.length || !tasksOpen) { el.innerHTML = ''; return }
      var lis = todos.map(function (t) {
        return '<li class="' + t.status + '"><span class="tick"></span><span class="task-content"></span></li>'
      }).join('')
      el.innerHTML = '<div class="tasks-sheet"><ul class="tasks-list">' + lis + '</ul></div>'
      var contents = el.querySelectorAll('.task-content')
      todos.forEach(function (t, i) { contents[i].textContent = t.content })
    }

    function renderPermission() {
      var el = document.getElementById('permSlot')
      if (!pending) { el.innerHTML = ''; return }
      var p = pending
      var html = '<div class="perm-backdrop"></div><div class="perm-sheet" data-perm="1">' +
        '<div class="perm-handle"></div>' +
        '<div class="perm-top">' +
        '<div class="perm-title-row"><span class="perm-action"></span></div>' +
        '<button class="perm-more" data-permmore="1">' + (permOpen ? 'Less' : 'Details') + '</button>' +
        '</div><span class="perm-sum"></span>'
      if (permOpen) html += '<pre class="perm-details mono"></pre>'
      html += '<div class="perm-actions"><button class="allow" data-decide="allow">Approve</button><button class="deny" data-decide="deny">Deny</button></div></div>'
      el.innerHTML = html
      el.querySelector('.perm-action').textContent = permAction(p)
      el.querySelector('.perm-sum').textContent = permSummary(p)
      if (permOpen) el.querySelector('.perm-details').textContent = permDetails(p)
    }

    var toolbarEl = document.getElementById('toolbar')
    var composerInput = document.getElementById('composerInput')
    var composerEl = document.getElementById('composer')

    function filtered(options) {
      var q = comboQuery.trim().toLowerCase()
      return q ? options.filter(function (o) { return o.label.toLowerCase().includes(q) }) : options
    }

    function ALL_SELECTORS() {
      return [
        { key: 'mode', label: modeLabel() || 'Mode', options: MODES(), isCurrent: function (o) { return mode === o.id }, onSelect: switchMode },
        { key: 'model', label: modelLabel || 'Model', options: MODELS(), isCurrent: function (o) { return modelLabel === o.label }, onSelect: switchModel },
        { key: 'effort', label: effortLabel || 'Effort', options: EFFORTS(), isCurrent: function (o) { return effortLabel === o.id }, onSelect: switchEffort },
      ].filter(function (s) { return s.options.length })
    }
    function toolbarSelectors() { return ALL_SELECTORS().filter(function (s) { return s.key === 'mode' }) }
    function menuSelectors() { return ALL_SELECTORS().filter(function (s) { return s.key !== 'mode' }) }

    function renderComboList(list, s) {
      var opts = filtered(s.options)
      list.innerHTML = ''
      if (!opts.length) { var d = div('combo-empty'); d.textContent = 'No matches'; list.appendChild(d); return }
      opts.forEach(function (o) {
        var b = document.createElement('button')
        if (s.isCurrent(o)) b.className = 'current'
        b.textContent = o.label
        b.addEventListener('click', function () { s.onSelect(o) })
        list.appendChild(b)
      })
    }

    function buildMenu(s) {
      var menu = div('menu combo')
      menu.addEventListener('click', function (e) { e.stopPropagation() })
      var input = document.createElement('input')
      input.className = 'combo-input'; input.placeholder = 'Search…'; input.value = comboQuery
      var list = div('combo-list')
      input.addEventListener('input', function () { comboQuery = input.value; renderComboList(list, s) })
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') { e.preventDefault(); var top = filtered(s.options)[0]; if (top) s.onSelect(top) }
        else if (e.key === 'Escape') { closeSelectorMenus() }
      })
      menu.appendChild(input); menu.appendChild(list)
      renderComboList(list, s)
      return menu
    }

    function buildSimpleMenu(s) {
      var menu = div('menu')
      menu.addEventListener('click', function (e) { e.stopPropagation() })
      s.options.forEach(function (o) {
        var b = document.createElement('button')
        if (s.isCurrent(o)) b.className = 'current'
        b.textContent = o.label
        b.addEventListener('click', function () { s.onSelect(o) })
        menu.appendChild(b)
      })
      return menu
    }
    function menuFor(s) { return s.key === 'model' ? buildMenu(s) : buildSimpleMenu(s) }

    function clampMenu(menu) {
      var margin = 8
      menu.style.left = ''
      var r = menu.getBoundingClientRect()
      var overflowRight = r.right - (window.innerWidth - margin)
      if (overflowRight > 0) menu.style.left = -overflowRight + 'px'
      r = menu.getBoundingClientRect()
      if (r.left < margin) menu.style.left = (parseFloat(menu.style.left || '0') + (margin - r.left)) + 'px'
    }

    function afterMenuRender(container) {
      if (!menuOpen) return
      var openMenu = container.querySelector('.menu')
      if (openMenu) clampMenu(openMenu)
      var inp = container.querySelector('.combo-input')
      if (inp) { inp.value = comboQuery; inp.focus(); var n = inp.value.length; try { inp.setSelectionRange(n, n) } catch (e) {} }
    }

    function renderToolbar() {
      var sels = toolbarSelectors()
      toolbarEl.innerHTML = ''
      if (!sels.length) return
      sels.forEach(function (s) {
        var el = div('sel' + (s.key === 'effort' ? ' cap' : '') + (menuOpen === s.key ? ' active' : ''))
        el.dataset.selKey = s.key
        var label = document.createElement('span')
        label.className = 'sel-label'; label.textContent = s.label
        el.appendChild(label)
        var wrap = document.createElement('span')
        wrap.innerHTML = CHEV
        el.appendChild(wrap.firstChild)
        if (menuOpen === s.key) el.appendChild(menuFor(s))
        toolbarEl.appendChild(el)
      })
      afterMenuRender(toolbarEl)
    }

    function closeSelectorMenus() {
      menuOpen = null
      renderToolbar()
      refreshKebabMenu()
    }

    function readyAttachments() { return attachments.filter(function (a) { return a.status === 'done' }) }
    function attachmentsUploading() { return attachments.some(function (a) { return a.status === 'uploading' }) }
    function hasSendableContent() { return !!composerInput.value.trim() || readyAttachments().length > 0 }

    function renderAttachSlot() {
      document.getElementById('attachSlot').innerHTML =
        '<button class="attachbtn" data-attach="1" title="Attach file" aria-label="Attach file">' +
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
        '<path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>'
    }

    function renderAttachStrip() {
      var el = document.getElementById('attachStrip')
      el.innerHTML = ''
      attachments.forEach(function (a) {
        var chip = div('attach-chip' + (a.status === 'error' ? ' error' : ''))
        chip.innerHTML = attachThumbHTML(a) + '<span class="attach-name"></span>' +
          (a.status === 'uploading' ? '<span class="attach-spin"></span>' : '') +
          '<button class="attach-remove" data-remove-attach="' + a.id + '" title="Remove">✕</button>'
        chip.querySelector('.attach-name').textContent = a.status === 'error' ? 'Failed – tap to remove' : a.name
        var fs = chip.querySelector('.filesvg')
        if (fs) fs.textContent = fileExtLabel(a.name)
        el.appendChild(chip)
      })
    }

    function onFilesChosen(fileList) {
      Array.prototype.forEach.call(fileList, function (file) {
        attachSeq++
        var a = {
          id: attachSeq, name: file.name, type: file.type, status: 'uploading', path: null,
          previewUrl: isImageType(file.type) ? URL.createObjectURL(file) : null,
        }
        attachments.push(a)
        uploadAttachment(a, file)
      })
      renderAttachStrip(); updateSendDisabled()
    }

    function uploadAttachment(a, file) {
      var fd = new FormData()
      fd.append('file', file)
      fetch('/api/upload', { method: 'POST', body: fd }).then(function (res) {
        if (!res.ok) throw new Error('upload failed')
        return res.json()
      }).then(function (data) {
        a.status = 'done'; a.path = data.path
      }).catch(function () {
        a.status = 'error'
      }).finally(function () {
        renderAttachStrip(); updateSendDisabled()
      })
    }

    function removeAttachment(id) {
      var i = attachments.findIndex(function (a) { return a.id === id })
      if (i < 0) return
      if (attachments[i].previewUrl) URL.revokeObjectURL(attachments[i].previewUrl)
      attachments.splice(i, 1)
      renderAttachStrip(); updateSendDisabled()
    }

    function updateSendButton() {
      var slot = document.getElementById('sendSlot')
      if (isBusy()) {
        slot.innerHTML = '<button class="iconbtn stopbtn" data-stop="1" title="Stop" aria-label="Stop"><svg width="12" height="12" viewBox="0 0 14 14"><rect x="2" y="2" width="10" height="10" rx="2" fill="currentColor"/></svg></button>'
      } else {
        var dis = (sessionClosed || !hasSendableContent() || sending || attachmentsUploading()) ? ' disabled' : ''
        slot.innerHTML = '<button class="iconbtn send" data-send="1" title="Send" aria-label="Send"' + dis + '><svg width="14" height="14" viewBox="0 0 18 18"><path d="M2 9L16 2L11 16L8.5 10.5L2 9Z" fill="currentColor"/></svg></button>'
      }
    }
    function updateSendDisabled() {
      if (isBusy()) return
      var b = document.querySelector('#sendSlot .send')
      if (b) b.disabled = sessionClosed || !hasSendableContent() || sending || attachmentsUploading()
    }

    function updateComposer() {
      composerEl.classList.toggle('busy', isBusy())
      composerInput.disabled = sessionClosed
      composerInput.placeholder = sessionClosed ? 'Session closed' : ('Message ' + agentLabel() + '…')
      updateSendButton()
    }

    function clearChat() { post('/api/clear') }
    function onCleared() {
      messages = []
      messagesEl.innerHTML = ''
      renderEmpty()
    }
    function closeSession() {
      if (!window.confirm('Close this session? This ends the ' + agentLabel() + ' process.')) return
      post('/api/close').then(function (res) {
        if (res.ok) {
          sessionClosed = true
          if (es) es.close()
          messages = []; messagesEl.innerHTML = ''
          attachments.forEach(function (a) { if (a.previewUrl) URL.revokeObjectURL(a.previewUrl) })
          attachments = []; renderAttachStrip()
          renderEmpty(); updateComposer()
        }
      })
    }

    function autogrow() {
      var el = composerInput
      el.style.height = 'auto'
      var vh = window.visualViewport ? window.visualViewport.height : window.innerHeight
      el.style.height = Math.min(el.scrollHeight, vh * 0.35) + 'px'
    }

    function post(url, body) {
      return fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: body ? JSON.stringify(body) : undefined,
      })
    }
    function send() {
      var text = composerInput.value.trim()
      var ready = readyAttachments()
      if ((!text && !ready.length) || sending || sessionClosed || attachmentsUploading()) return
      sending = true
      updateSendDisabled()
      var paths = ready.map(function (a) { return a.path }).join('\n')
      var full = paths && text ? paths + '\n' + text : (paths || text)
      var snapshot = ready.map(function (a) { return { name: a.name, type: a.type, previewUrl: a.previewUrl } })
      post('/api/send', { text: full }).then(function (res) {
        if (res.ok) {
          queued.push({ caption: text, attachments: snapshot })
          attachments = attachments.filter(function (a) { return ready.indexOf(a) === -1 })
          composerInput.value = ''; autogrow(); renderQueued(); renderAttachStrip(); scrollDown(true)
          if (isTouch) composerInput.blur(); else composerInput.focus()
        }
      }).finally(function () { sending = false; updateSendDisabled() })
    }
    function decide(decision) { if (pending) post('/api/permission', { id: pending.id, decision: decision }) }
    function stop() { post('/api/interrupt') }
    function switchMode(o) { menuOpen = null; mode = o.id; renderToolbar(); renderHeader(); post('/api/mode', { mode: o.id }) }
    function switchModel(o) { menuOpen = null; modelLabel = o.label; renderToolbar(); renderHeader(); post('/api/model', { model: o.id, label: o.label }) }
    function switchEffort(o) { menuOpen = null; effortLabel = o.id; renderToolbar(); renderHeader(); post('/api/effort', { level: o.id }) }

    function updateBoot() { document.getElementById('boot').style.display = appReady() ? 'none' : '' }

    var modelsFetchStarted = false
    function ensureModels() {
      if (modelsFetchStarted) return
      modelsFetchStarted = true
      if (agent !== 'opencode') { modelsLoaded = true; updateBoot(); renderToolbar(); return }
      var poll = function () {
        fetch('/api/models').then(function (r) { return r.json() }).then(function (list) {
          if (list && list.length) { opencodeModels = list; modelsLoaded = true; updateBoot(); renderToolbar() }
          else setTimeout(poll, 400)
        }).catch(function () { setTimeout(poll, 400) })
      }
      poll()
    }

    var es = null
    function connect() {
      es = new EventSource('/api/events')
      es.addEventListener('message', function (e) { onMessage(JSON.parse(e.data)) })
      es.addEventListener('cleared', function () { onCleared() })
      es.addEventListener('state', function (e) {
        var st = JSON.parse(e.data)
        var prev = status
        status = st.status
        if (typeof st.started === 'boolean') started = st.started
        if (st.agent) agent = st.agent
        if (st.title) title = st.title
        pending = st.pending
        mode = st.mode || mode
        if (st.effort) effortLabel = st.effort
        todos = st.todos || []
        if (st.model) modelLabel = displayModel(st.model)
        else if (st.modelName) modelLabel = displayModel(st.modelName)

        if (pending) {
          if (pending.id !== lastPendingId) { permOpen = false; lastPendingId = pending.id; scrollDown(true) }
        } else {
          lastPendingId = null
        }

        ensureModels()
        if (status !== prev) onStatusChange(status, prev)
        renderHeader(); renderTasks(); renderPermission(); renderFab()
        renderEmpty(); renderQueued(); updateComposer(); renderToolbar(); updateBoot()
      })
      es.onerror = function () {
        var prev = status
        status = 'connecting'
        if (status !== prev) onStatusChange(status, prev)
        renderHeader(); renderEmpty(); updateComposer(); updateBoot()
      }
    }

    document.addEventListener('click', function (e) {
      var t = e.target
      var sel = t.closest('.sel,.menurow')
      var kebabWrap = t.closest('.kebab-wrap')

      if (!kebabWrap && kebabOpen) { kebabOpen = false; menuOpen = null; renderHeader() }
      if (!sel && menuOpen) closeSelectorMenus()

      if (t.closest('[data-kebab]')) {
        kebabOpen = !kebabOpen
        if (!kebabOpen) menuOpen = null
        renderHeader()
        return
      }
      if (sel) {
        var k = sel.dataset.selKey
        menuOpen = menuOpen === k ? null : k
        comboQuery = ''
        if (sel.classList.contains('menurow')) refreshKebabMenu()
        else renderToolbar()
        return
      }
      if (t.closest('[data-clear]')) { clearChat(); kebabOpen = false; renderHeader(); return }
      if (t.closest('[data-close]')) { closeSession(); kebabOpen = false; renderHeader(); return }
      var toggle = t.closest('[data-toggle]')
      if (toggle) { var box = t.closest('.thinking,.act'); if (box) box.classList.toggle('open'); return }
      if (t.closest('[data-tasks]')) { tasksOpen = !tasksOpen; renderHeader(); renderTasks(); return }
      if (t.closest('[data-permmore]')) { permOpen = !permOpen; renderPermission(); return }
      var dec = t.closest('[data-decide]')
      if (dec) { decide(dec.dataset.decide); return }
      if (t.closest('[data-fab]')) { scrollDown(true); return }
      if (t.closest('[data-send]')) { send(); return }
      if (t.closest('[data-stop]')) { stop(); return }
      if (t.closest('[data-attach]')) { document.getElementById('fileInput').click(); return }
      var rem = t.closest('[data-remove-attach]')
      if (rem) { removeAttachment(Number(rem.dataset.removeAttach)); return }
    })

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && menuOpen) closeSelectorMenus()
    })

    composerInput.addEventListener('input', function () { autogrow(); updateSendDisabled() })
    composerInput.addEventListener('focus', function () {
      if (menuOpen) closeSelectorMenus()
      scrollDown(true)
    })
    composerInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.metaKey && !e.altKey && !e.isComposing) { e.preventDefault(); send() }
    })
    document.getElementById('fileInput').addEventListener('change', function (e) {
      onFilesChosen(e.target.files)
      e.target.value = ''
    })

    renderHeader(); renderEmpty(); updateComposer(); renderToolbar(); renderAttachSlot(); renderAttachStrip(); updateBoot()
    updateKeyboardOffset()
    connect()
    if (window.innerWidth > 640) composerInput.focus()
  })()
  </script>
</body>
</html>
